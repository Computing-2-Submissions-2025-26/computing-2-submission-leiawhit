<!DOCTYPE html>
<html lang="en-gb">
<meta charset="utf-8">
<title>Labyrinth</title>
<link rel="stylesheet" href="default.css">
<link rel="stylesheet" href="game.css">
<link rel="icon" href="./assets/Earthtransformed.png">
<script type="module" src="game.js"></script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">


<body>
<main id="game_screen">

    <img id="poem" src="assets/PoemLines.svg" alt="Shift the maze, 
    let lost souls roam. Gather their hearts to be restored...">

    <div id="player_panels">

        <div class="player_panel" id="panel_1" data-player="1">
            <img class="panel_bg" src="assets/rectangular3.png" alt="">
            <img class="panel_character" src="assets/EarthCharacter.png" alt="Player 1">
            <div class="heart_row">
                <img class="heart" src="assets/HeartSlot.png" alt="">
                <img class="heart" src="assets/HeartSlot.png" alt="">
                <img class="heart" src="assets/HeartSlot.png" alt="">
            </div>
        </div>

        <div class="player_panel" id="panel_2" data-player="2">
            <img class="panel_bg" src="assets/rectangular2.png" alt="">
            <img class="panel_character" src="assets/FireCharacter.png" alt="Player 2">
            <div class="heart_row">
                <img class="heart" src="assets/HeartSlot.png" alt="">
                <img class="heart" src="assets/HeartSlot.png" alt="">
                <img class="heart" src="assets/HeartSlot.png" alt="">
            </div>
        </div>

        <div class="player_panel" id="panel_3" data-player="3">
            <img class="panel_bg" src="assets/rectangular3.png" alt="">
            <img class="panel_character" src="assets/Shadowcharacter.png" alt="Player 3">
            <div class="heart_row">
                <img class="heart" src="assets/HeartSlot.png" alt="">
                <img class="heart" src="assets/HeartSlot.png" alt="">
                <img class="heart" src="assets/HeartSlot.png" alt="">
            </div>
        </div>

        <div class="player_panel" id="panel_4" data-player="4">
            <img class="panel_bg" src="assets/Rectangular1.png" alt="">
            <img class="panel_character" src="assets/WindCharacter.png" alt="Player 4">
            <div class="heart_row">
                <img class="heart" src="assets/HeartSlot.png" alt="">
                <img class="heart" src="assets/HeartSlot.png" alt="">
                <img class="heart" src="assets/HeartSlot.png" alt="">
            </div>
        </div>

    </div>

    <div id="spare_area">
        <div id="spare_tile"></div>
        <img id="rotate_arrows" src="assets/Rotatearrows.svg" alt="">
    </div>

    <div class="push_arrow arrow_down" data-dir="top" data-column="1"><img src="assets/ArrowPointer.svg" alt="Push column 1 down"></div>
    <div class="push_arrow arrow_down" data-dir="top" data-column="3"><img src="assets/ArrowPointer.svg" alt="Push column 3 down"></div>
    <div class="push_arrow arrow_down" data-dir="top" data-column="5"><img src="assets/ArrowPointer.svg" alt="Push column 5 down"></div>

    <div class="push_arrow arrow_up" data-dir="bot" data-column="1"><img src="assets/ArrowPointer.svg" alt="Push column 1 up"></div>
    <div class="push_arrow arrow_up" data-dir="bot" data-column="3"><img src="assets/ArrowPointer.svg" alt="Push column 3 up"></div>
    <div class="push_arrow arrow_up" data-dir="bot" data-column="5"><img src="assets/ArrowPointer.svg" alt="Push column 5 up"></div>

    <div class="push_arrow arrow_right" data-dir="left" data-row="1"><img src="assets/ArrowPointer.svg" alt="Push row 1 right"></div>
    <div class="push_arrow arrow_right" data-dir="left" data-row="3"><img src="assets/ArrowPointer.svg" alt="Push row 3 right"></div>
    <div class="push_arrow arrow_right" data-dir="left" data-row="5"><img src="assets/ArrowPointer.svg" alt="Push row 5 right"></div>

    <div class="push_arrow arrow_left" data-dir="right" data-row="1"><img src="assets/ArrowPointer.svg" alt="Push row 1 left"></div>
    <div class="push_arrow arrow_left" data-dir="right" data-row="3"><img src="assets/ArrowPointer.svg" alt="Push row 3 left"></div>
    <div class="push_arrow arrow_left" data-dir="right" data-row="5"><img src="assets/ArrowPointer.svg" alt="Push row 5 left"></div>

    <div id="game_board"></div>

    <a id="tutorial_button" href="tutorial.html">
        <img id="tutorial_book" src="assets/TutorialBook.png" alt="Open tutorial">
        <span id="tutorial_label">Tutorial</span>
    </a>

</main>

<div id="portal_flash"></div>

</body>
</html>
